name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  pypi-publish:
    # Build + publish to PyPI ONLY when a PYPI_API_TOKEN secret is configured.
    # The gate below makes the job a no-op (skipped) on repos without the secret,
    # so PyPI is never hard-required.
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect PyPI token
        id: gate
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "No PYPI_API_TOKEN secret set — skipping PyPI publish."
          fi

      - name: Set up Python
        if: steps.gate.outputs.has_token == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        if: steps.gate.outputs.has_token == 'true'
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        if: steps.gate.outputs.has_token == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
