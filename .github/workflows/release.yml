name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches cc_usage.__version__
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Install only enough to import the package and read its version.
          python -m pip install --upgrade pip
          python -m pip install -e .
          pkg_version="$(python -c 'import cc_usage; print(cc_usage.__version__)')"
          expected="v${pkg_version}"
          echo "Pushed tag:        ${GIT_TAG}"
          echo "Package version:   ${pkg_version}"
          echo "Expected tag:      ${expected}"
          if [ "${GIT_TAG}" != "${expected}" ]; then
            echo "::error::Tag ${GIT_TAG} does not match cc_usage.__version__ (${expected}). Aborting release."
            exit 1
          fi
          echo "Tag and package version are consistent."

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Extract release notes from CHANGELOG
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Pull the "## [X.Y.Z]" section for this tag out of CHANGELOG.md so the GitHub
          # Release body mirrors our Keep a Changelog notes instead of a bare PR-title list.
          # Regex-free (index/substr) to avoid awk bracket-escaping pitfalls; stops at the
          # next version heading OR the link-reference block at the file's end.
          ver="${GIT_TAG#v}"
          awk -v hdr="## [$ver]" '
            index($0,hdr)==1 {flag=1; print; next}
            !flag {next}
            index($0,"## [")==1 {exit}
            (substr($0,1,1)=="[" && index($0,"]: http")>0) {exit}
            {print}
          ' CHANGELOG.md > release-notes.md
          # Trim trailing blank lines.
          sed -i -e ':a' -e '/^[[:space:]]*$/{$d;N;ba}' release-notes.md || true
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section found for ${ver}; falling back to tag name."
            echo "Release ${GIT_TAG}." > release-notes.md
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Create GitHub Release (with built artifacts attached)
        uses: softprops/action-gh-release@v2
        with:
          # Curated CHANGELOG section first; GitHub appends the auto "What's Changed"
          # (PR list + compare link) after it.
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  pypi-publish:
    # Build + publish to PyPI ONLY when a PYPI_API_TOKEN secret is configured.
    # The gate below makes the job a no-op (skipped) on repos without the secret,
    # so PyPI is never hard-required. Runs after the GitHub Release (which already
    # carries the wheel + sdist), so installs/updates never depend on PyPI.
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect PyPI token
        id: gate
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "No PYPI_API_TOKEN secret set — skipping PyPI publish."
          fi

      - name: Set up Python
        if: steps.gate.outputs.has_token == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        if: steps.gate.outputs.has_token == 'true'
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        if: steps.gate.outputs.has_token == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
